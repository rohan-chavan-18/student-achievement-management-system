<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Achievement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/form.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <h2 style="display:none"></h2>
    <div class="sidebar-brand">
        <span class="brand-icon">◈</span>
        <span class="brand-text">AchieveIQ</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="/dashboard" id="dashboardLink" class="nav-link">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </span>
            <span class="nav-label">Dashboard</span>
        </a>
        <a href="/upload" class="nav-link active">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </span>
            <span class="nav-label">Upload</span>
        </a>
        <a href="/records" class="nav-link">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </span>
            <span class="nav-label">Records</span>
        </a>
    </nav>
    <div class="sidebar-footer">
        <a href="#" onclick="logout()" class="nav-link logout-link">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </span>
            <span class="nav-label">Logout</span>
        </a>
    </div>
</aside>

<div class="main">

    <header class="topbar">
        <div class="topbar-left">
            <button class="menu-toggle" onclick="toggleSidebar()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="page-breadcrumb">
                <span class="breadcrumb-parent">Portal</span>
                <span class="breadcrumb-sep">›</span>
                <span class="breadcrumb-current">Upload Achievement</span>
            </div>
        </div>
        <div class="topbar-right">
            <div class="topbar-profile" id="profileName"></div>
        </div>
    </header>

    <div class="content-area">

        <div class="section-heading">
            <div>
                <h1 class="page-title">Upload Achievement</h1>
                <p class="page-subtitle">Add a new achievement to your portfolio</p>
            </div>
        </div>

        <!-- FORM CARD -->
        <div class="form-card">

            <div class="form-card-header">
                <div class="form-card-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <div>
                    <h2 class="form-card-title">Achievement Details</h2>
                    <p class="form-card-sub">Fill in the details below to record your achievement</p>
                </div>
            </div>

            <form class="upload-form" id="uploadForm" novalidate>

                <!-- Admin-only username field -->
                <div class="form-row" id="usernameBlock" style="display:none">
                    <div class="form-group form-group--full">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
                            Student Username
                        </label>
                        <input type="text" id="username" name="username" placeholder="Enter student username" class="form-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group form-group--full">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              </span>
                            Achievement Title
                        </label>
                        <input type="text" id="title" name="title" placeholder="e.g. First Prize in Hackathon 2026" class="form-input" required>
                    </div>
                </div>

                <div class="form-row form-row--2col">
                    <div class="form-group">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h8m-8 6h16"/></svg>
              </span>
                            Category
                        </label>
                        <select id="category" name="category" class="form-select" required>
                            <option value="">Select Category</option>
                            <option value="technical">Technical</option>
                            <option value="sports">Sports</option>
                            <option value="cultural">Cultural</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </span>
                            Position / Status
                        </label>
                        <select id="status" name="status" class="form-select" required>
                            <option value="">Select Status</option>
                            <option value="winner">🥇 Winner</option>
                            <option value="runner">🥈 Runner-up</option>
                            <option value="participation">🎖 Participation</option>
                        </select>
                    </div>
                </div>

                <div class="form-row form-row--2col">
                    <div class="form-group">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
                            Year
                        </label>
                        <input type="text" id="year" name="year" placeholder="e.g. 2026" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
              </span>
                            Semester
                        </label>
                        <input type="text" id="semester" name="semester" placeholder="e.g. 6" class="form-input" required>
                    </div>
                </div>

                <div class="form-row form-row--2col">
                    <div class="form-group">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
              </span>
                            Event Level
                        </label>
                        <select id="eventLevel" class="form-select">
                            <option value="college">College</option>
                            <option value="district">District</option>
                            <option value="state">State</option>
                            <option value="national">National</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              </span>
                            Skills Used
                        </label>
                        <input type="text" id="skills" placeholder="e.g. Java, AI, Spring Boot" class="form-input">
                    </div>
                </div>

                <!-- FILE UPLOAD -->
                <div class="form-row">
                    <div class="form-group form-group--full">
                        <label class="form-label">
              <span class="label-icon">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </span>
                            Upload Certificate (PDF)
                        </label>
                        <label class="file-drop" id="fileDrop">
                            <div class="file-drop-inner">
                                <div class="file-drop-icon">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                </div>
                                <div class="file-drop-text">
                                    <span class="file-drop-primary">Click to upload or drag & drop</span>
                                    <span class="file-drop-sub">PDF files only · Max 10MB</span>
                                </div>
                            </div>
                            <span class="file-name-display" id="fileNameDisplay">No file chosen</span>
                            <input type="file" id="pdfFile" name="file" accept="application/pdf" required style="display:none">
                        </label>
                    </div>
                </div>

                <!-- SUBMIT -->
                <div class="form-row">
                    <div class="form-group form-group--full">
                        <button type="submit" class="submit-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            Upload Achievement
                        </button>
                    </div>
                </div>

                <p id="uploadMessage" class="upload-msg"></p>

            </form>
        </div>

    </div>
</div>

<script src="/js/upload.js"></script>
<script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('sidebar--collapsed');
      document.querySelector('.main').classList.toggle('main--expanded');
    }
    // File name display
    document.getElementById('pdfFile').addEventListener('change', function() {
      const display = document.getElementById('fileNameDisplay');
      display.textContent = this.files[0] ? this.files[0].name : 'No file chosen';
    });
    // Clicking the drop zone triggers file input
    document.getElementById('fileDrop').addEventListener('click', function(e) {
      if (e.target !== document.getElementById('pdfFile')) {
        document.getElementById('pdfFile').click();
      }
    });
</script>
</body>
</html>
